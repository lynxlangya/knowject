<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowject Wordmark</title>
  <style>
    :root {
      --ink: #172343;
      --ink-soft: #243a67;
      --blue-0: #0a1b4d;
      --blue-1: #1f54c9;
      --blue-2: #3f8bff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f3f6fb;
      font-family: "Avenir Next", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .canvas {
      width: 900px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 38px;
      background: #f3f6fb;
    }
    .wordmark {
      display: inline-flex;
      align-items: baseline;
      line-height: 1;
      letter-spacing: -1.3px;
      user-select: none;
    }
    .wordmark .k {
      font-size: 126px;
      font-weight: 760;
      background: linear-gradient(145deg, var(--blue-0) 0%, var(--blue-1) 58%, var(--blue-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 8px 20px rgba(40, 94, 218, 0.18);
      position: relative;
      margin-right: 2px;
    }
    .wordmark .k::after {
      content: "";
      position: absolute;
      left: 43%;
      top: 23%;
      width: 7px;
      height: 56px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      transform: rotate(44deg);
      filter: drop-shadow(0 1px 2px rgba(255,255,255,0.25));
      pointer-events: none;
    }
    .wordmark .rest {
      font-size: 118px;
      font-weight: 700;
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
    }
    .wordmark .rest em {
      font-style: normal;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <main class="canvas" id="wordmark-canvas">
    <h1 class="wordmark" aria-label="Knowject">
      <span class="k">K</span><span class="rest">now<em>ject</em></span>
    </h1>
  </main>
</body>
</html>
