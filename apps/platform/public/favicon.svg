<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b6dc1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield Outline -->
  <path d="M32 2 L4 14 V32 C4 48 16 58 32 62 C48 58 60 48 60 32 V14 L32 2Z" fill="url(#grad)"/>
  
  <!-- Dark Inner Shield -->
  <path d="M32 6 L8 16 V32 C8 45 18 54 32 57 C46 54 56 45 56 32 V16 L32 6Z" fill="#020817"/>
  
  <!-- Radar Elements -->
  <circle cx="32" cy="32" r="14" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.8"/>
  <circle cx="32" cy="32" r="8" stroke="#00f2ff" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="32" cy="32" r="4" fill="#00f2ff"/>
  
  <!-- Scanner Line -->
  <path d="M32 32 L44 20" stroke="#00f2ff" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="3s" repeatCount="indefinite"/>
  </path>
</svg>